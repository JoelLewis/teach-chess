[package]
name = "chess-mentor"
version = "0.1.0"
edition = "2021"
license = "GPL-3.0-only"

[lib]
name = "chess_mentor_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
shakmaty = "0.27"
rusqlite = { version = "0.32", features = ["bundled"] }
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4", "serde"] }
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
toml = "0.8"

# System info (sandbox-compatible memory detection)
sysinfo = "0.33"

# LLM coaching
candle-core = "0.9"
candle-transformers = "0.9"
tokenizers = { version = "0.22", default-features = false, features = ["onig"] }
reqwest = { version = "0.12", features = ["stream"] }
futures-util = "0.3"
tokio-util = { version = "0.7", features = ["rt"] }
sha2 = "0.10"

# macOS builds always get Metal-accelerated inference compiled in (features
# unify with the base candle dependencies above; no CLI flags needed).
[target.'cfg(target_os = "macos")'.dependencies]
candle-core = { version = "0.9", features = ["metal"] }
candle-transformers = { version = "0.9", features = ["metal"] }

[dev-dependencies]
tempfile = "3"

[features]
default = ["llm"]
llm = []
llm-cuda = ["candle-core/cuda", "candle-transformers/cuda"]
llm-metal = ["candle-core/metal", "candle-transformers/metal"]

# Unoptimized candle is ~50x too slow for the in-app coaching timeouts, so keep
# the inference stack optimized even in `tauri dev` (debug) builds.
[profile.dev.package.candle-core]
opt-level = 3
[profile.dev.package.candle-nn]
opt-level = 3
[profile.dev.package.candle-transformers]
opt-level = 3
[profile.dev.package.candle-metal-kernels]
opt-level = 3
[profile.dev.package.gemm]
opt-level = 3
[profile.dev.package.gemm-common]
opt-level = 3
[profile.dev.package.gemm-f32]
opt-level = 3
[profile.dev.package.gemm-f16]
opt-level = 3
[profile.dev.package.gemm-f64]
opt-level = 3
[profile.dev.package.gemm-c32]
opt-level = 3
[profile.dev.package.gemm-c64]
opt-level = 3
[profile.dev.package.pulp]
opt-level = 3
[profile.dev.package.tokenizers]
opt-level = 3
