[package]
name = "chess-mentor"
version = "0.1.0"
edition = "2021"
license = "GPL-3.0-only"

[lib]
name = "chess_mentor_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
shakmaty = "0.27"
rusqlite = { version = "0.32", features = ["bundled"] }
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4", "serde"] }
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
toml = "0.8"

# System info (sandbox-compatible memory detection)
sysinfo = "0.33"

# LLM coaching
candle-core = "0.9"
candle-transformers = "0.9"
tokenizers = { version = "0.22", default-features = false, features = ["onig"] }
hf-hub = { version = "0.5", features = ["tokio"] }
tokio-util = { version = "0.7", features = ["rt"] }
sha2 = "0.10"

[dev-dependencies]
tempfile = "3"

[features]
default = ["llm"]
llm = []
llm-cuda = ["candle-core/cuda", "candle-transformers/cuda"]
llm-metal = ["candle-core/metal", "candle-transformers/metal"]
