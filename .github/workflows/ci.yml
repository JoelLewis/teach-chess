name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: Fetch Stockfish sidecar
        run: ./scripts/fetch-stockfish.sh

      - name: Cargo fmt check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Version sync check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          CARGO_VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "package.json: $PKG_VERSION"
          echo "Cargo.toml:   $CARGO_VERSION"
          echo "tauri.conf:   $TAURI_VERSION"
          if [ "$PKG_VERSION" != "$CARGO_VERSION" ] || [ "$PKG_VERSION" != "$TAURI_VERSION" ]; then
            echo "::error::Version mismatch! All three files must have the same version."
            exit 1
          fi

      - name: Cargo check (default features)
        working-directory: src-tauri
        run: cargo check

      - name: Cargo check (LLM features)
        working-directory: src-tauri
        run: cargo check --features llm

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

      - name: Cargo test (LLM features)
        working-directory: src-tauri
        run: cargo test --features llm

      - name: Stockfish integration tests
        working-directory: src-tauri
        run: cargo test -- --ignored

      - name: Build frontend
        run: npm run build

      - name: Svelte check
        run: npx svelte-check --tsconfig ./tsconfig.json

      - name: Frontend tests
        run: npx vitest run

  clippy:
    name: Clippy
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: Fetch Stockfish sidecar
        run: ./scripts/fetch-stockfish.sh

      - name: Clippy (default features)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (LLM features)
        working-directory: src-tauri
        run: cargo clippy --features llm --all-targets -- -D warnings
