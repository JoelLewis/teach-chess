<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChessMentor</title>
    <script>
      // Apply theme synchronously before first paint to prevent flash
      (function() {
        try {
          var stored = localStorage.getItem('cm-theme');
          var theme = stored || 'study';
          if (theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'grid' : 'study';
          }
          document.documentElement.dataset.theme = theme;
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
